# Cloudflare deployment — static-assets Worker.
#
# `npm run build` emits the whole site into ./out (Next static export); this
# config serves it from Cloudflare's edge with no Worker script (assets-only).
# The project's deploy command `npx wrangler deploy` reads [assets].directory
# below and uploads ./out.
#
# Remember to set NEXT_PUBLIC_API_BASE_URL in the project's variables (see
# .env.example) so the build points at the Railway backend, and add the final
# deployed origin to the backend's CORS_ALLOWED_ORIGINS.
name = "dalivim-frontend"
compatibility_date = "2024-10-01"

[assets]
directory = "./out"
# Serve Next's generated 404.html for unknown paths; default html_handling
# ("auto-trailing-slash") already matches the trailingSlash export.
not_found_handling = "404-page"
