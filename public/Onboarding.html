<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<title>Dalivim — Criar conta protegida</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="icon" type="image/svg+xml" href="assets/dalivim-mark.svg"/>
<link rel="stylesheet" href="assets/colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #F4F4F5; color: #0A0A0A; font-family: 'Inter', sans-serif; }
  *, *::before, *::after { box-sizing: border-box; }
  a { color: inherit; }
  button:focus-visible, input:focus-visible, a:focus-visible {
    outline: none; box-shadow: 0 0 0 3px rgba(30,75,160,0.25);
  }
  input::placeholder { color: #A1A1AA; }
  @keyframes dv-fade-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes dv-step-in {
    from { opacity: 0; transform: translate3d(14px, 0, 0); }
    to   { opacity: 1; transform: translate3d(0, 0, 0); }
  }
  @keyframes dv-pulse-dot {
    0%, 100% { box-shadow: 0 0 0 3px rgba(127,209,168,0.18); }
    50%      { box-shadow: 0 0 0 6px rgba(127,209,168,0.05); }
  }
  @media (max-width: 880px) {
    .dv-ob-card { grid-template-columns: 1fr !important; max-width: 460px !important; }
    .dv-ob-preview { display: none !important; }
    .dv-ob-form { min-height: 0 !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<!-- Dalivim runtime config + API client (backend on Railway). config.js sets
     window.DALIVIM_API_BASE_URL; api.js exposes window.DalivimAPI. -->
<script src="assets/config.js"></script>
<script src="src/api.js"></script>

<script type="text/babel" src="src/Atoms.jsx"></script>
<script type="text/babel" src="src/Icons.jsx"></script>
<script type="text/babel" src="src/Onboarding.jsx"></script>
</body>
</html>
